<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Dボクセル・ダンジョン</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
        }
        .controls {
            font-size: 14px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Voxel Dungeon (Phase 1)</h1>
        <div class="controls">
            WASD / 矢印: 移動 | SPACE: ジャンプ
        </div>
    </div>
    
    <!-- Three.js Import Map -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.162.0/build/three.module.js"
            }
        }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
